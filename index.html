import { useEffect, useState } from "react";
import { getProjects } from "./sanity";

export default function Home() {
  const [projects, setProjects] = useState([]);

  useEffect(() => {
    getProjects().then(setProjects);
  }, []);

  return (
    <div>
      {projects.map((p) => (
        <div key={p._id}>
          <h2>{p.title}</h2>
          <p>{p.description}</p>
        </div>
      ))}
    </div>
  );
}
